name: Build slides and deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions required by the GitHub Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install LaTeX toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            texlive-full gnuplot inkscape pdf2svg pandoc make

      - name: Build all lecture PDFs
        run: make all

      - name: Assemble the Pages site
        run: |
          mkdir -p public/lectures
          # Landing page: render the README, but repoint each lecture link from
          # the raw PDF to its subpage (lectures/<base>.html). The README itself
          # (viewed on GitHub) keeps linking straight to the PDF.
          sed -E 's#https://bpgvp\.github\.io/mm-continuous-optimization/([A-Za-z0-9._-]+)\.pdf#lectures/\1.html#g' \
            README.md > index.md
          pandoc index.md \
            --standalone \
            --from gfm \
            --to html5 \
            --metadata pagetitle="Continuous Optimization" \
            --css style.css \
            --output public/index.html
          # One subpage per lecture: description placeholder plus links to the
          # PDF and any related Colab notebooks. Each source .md lives beside its
          # slides in the lecture directory, sharing the PDF/.tex basename, and
          # renders to lectures/<base>.html (matching the homepage links above).
          for md in Lectures/*/*.md; do
            name=$(basename "$md" .md)
            pandoc "$md" \
              --standalone \
              --from gfm+yaml_metadata_block \
              --to html5 \
              --css ../style.css \
              --output "public/lectures/$name.html"
          done
          cp pages/style.css public/
          cp Max_paraboloid.svg.png public/
          # Publish every lecture PDF at the site root.
          cp Lectures/*/*.pdf public/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
