name: Build slides and deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions required by the GitHub Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install LaTeX toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            texlive-full gnuplot inkscape pdf2svg pandoc make

      - name: Build all lecture PDFs
        run: make all

      - name: Assemble the Pages site
        run: |
          mkdir -p public
          # Render the README into a styled landing page.
          pandoc README.md \
            --standalone \
            --from gfm \
            --to html5 \
            --metadata pagetitle="Continuous Optimization" \
            --css style.css \
            --output public/index.html
          cp pages/style.css public/
          cp Max_paraboloid.svg.png public/
          # Publish every lecture PDF at the site root.
          cp Lectures/*/*.pdf public/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
