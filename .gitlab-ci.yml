build-job:       # This job runs in the build stage, which runs first.
  tags:
    - latex
  script:
    - make all
  artifacts:
    paths:
      - Lectures/*/*.pdf

pages:
  stage: deploy
  image:
    name: pandoc/core:latest
    entrypoint: [""]
  script:
    - mkdir .public
    # Convert the README into a styled landing page (index.html).
    - >
      pandoc README.md
      --standalone
      --from gfm
      --to html5
      --metadata pagetitle="Continuous Optimization"
      --css style.css
      --output .public/index.html
    - cp pages/style.css .public
    - cp Max_paraboloid.svg.png .public
    # Publish the lecture PDFs alongside the landing page.
    - cp -r Lectures/*/*.pdf .public
    - mv .public public
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  environment: production

